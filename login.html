<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - Nhím Billiards</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 10px; border: 1px solid #d4af37; text-align: center; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        input { padding: 10px; width: 200px; border-radius: 5px; border: 1px solid #444; background: #000; color: #fff; margin-bottom: 15px; text-align: center; }
        button { padding: 10px 25px; background: #d4af37; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #f1c40f; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: #d4af37;">QUẢN TRỊ VIÊN</h2>
        <p>Vui lòng nhập mã PIN để tiếp tục</p>
       <input type="password" id="pinInput" inputmode="numeric" pattern="[0-9]*" placeholder="Nhập mã PIN...">
        <br>
        <button onclick="checkLogin()">Vào trang quản trị</button>
    </div>

    <script>
        function checkLogin() {
            const pin = document.getElementById('pinInput').value;
            // Bạn có thể đổi mã '1234' thành mã bạn muốn
            if (pin === '1234') {
                // Lưu trạng thái đã đăng nhập vào sessionStorage (tự xóa khi đóng trình duyệt)
                sessionStorage.setItem('isAdmin', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('Mã PIN không chính xác!');
            }
        }
    </script>
</body>
</html>
